name: Build APK And Push To Telegram

on:
  push:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Telegram
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x gradlew

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Prepare release keystore
        id: keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            echo "Missing release signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD in the Telegram environment." >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/release.keystore"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "$keystore_path"
          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Extract expected signing fingerprint
        id: signing_fingerprint
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          keytool_output=$(keytool -list -v \
            -keystore "${ANDROID_KEYSTORE_PATH}" \
            -storepass "${ANDROID_KEYSTORE_PASSWORD}" \
            -alias "${ANDROID_KEY_ALIAS}")

          expected_sha256=$(printf '%s\n' "${keytool_output}" \
            | sed -n 's/^[[:space:]]*SHA256:[[:space:]]*//p' \
            | head -n 1 \
            | tr -d '[:space:]:' \
            | tr '[:upper:]' '[:lower:]')

          owner_line=$(printf '%s\n' "${keytool_output}" \
            | sed -n 's/^Owner: //p' \
            | head -n 1)

          signer_name=$(OWNER_LINE="${owner_line}" python3 - <<'PY'
          import os
          import re

          owner = os.environ.get("OWNER_LINE", "").strip()
          if not owner:
              print("Unknown signer", end="")
              raise SystemExit(0)

          match = re.search(r"(?:^|,\s*)CN=([^,]+)", owner)
          if match:
              print(match.group(1).strip(), end="")
          else:
              print(owner, end="")
          PY
          )

          if [ -z "${expected_sha256}" ]; then
            echo "Failed to extract SHA-256 fingerprint from the configured keystore." >&2
            exit 1
          fi

          echo "sha256=${expected_sha256}" >> "$GITHUB_OUTPUT"
          echo "signer_name=${signer_name}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        id: build
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          start_time=$(date +%s)
          ./gradlew :app:assembleRelease
          end_time=$(date +%s)

          duration_seconds=$((end_time - start_time))
          duration_minutes=$((duration_seconds / 60))
          duration_remainder=$((duration_seconds % 60))

          printf -v duration_human "%dm %02ds" "$duration_minutes" "$duration_remainder"

          echo "duration_seconds=$duration_seconds" >> "$GITHUB_OUTPUT"
          echo "duration_human=$duration_human" >> "$GITHUB_OUTPUT"

      - name: Collect artifact metadata
        id: metadata
        shell: bash
        env:
          DURATION_HUMAN: ${{ steps.build.outputs.duration_human }}
          GIT_BRANCH: ${{ github.ref_name }}
          SIGNER_NAME: ${{ steps.signing_fingerprint.outputs.signer_name }}
        run: |
          set -euo pipefail

          metadata_json=$(python3 - <<'PY'
          import json
          from pathlib import Path

          metadata_candidates = [
              Path("app/release/output-metadata.json"),
              Path("app/build/outputs/apk/release/output-metadata.json"),
          ]
          metadata_path = next((path for path in metadata_candidates if path.exists()), None)
          if metadata_path is None:
              raise SystemExit(
                  "Release output-metadata.json not found in app/release or app/build/outputs/apk/release."
              )

          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          elements = metadata.get("elements") or []
          if not elements:
              raise SystemExit("No APK entries found in output-metadata.json.")

          universal_elements = [
              element for element in elements
              if element.get("outputFile", "").endswith("-Universal.apk")
          ]
          if len(universal_elements) != 1:
              raise SystemExit(
                  f"Expected exactly one Universal APK entry, found {len(universal_elements)}."
              )

          apk_path = metadata_path.parent / universal_elements[0]["outputFile"]
          if not apk_path.exists():
              raise SystemExit(f"Universal APK not found at {apk_path}.")

          payload = {
              "apk_path": str(apk_path),
              "apk_name": apk_path.name,
              "version_name": universal_elements[0].get("versionName") or "unknown",
              "version_code": str(universal_elements[0].get("versionCode") or "unknown"),
          }
          print(json.dumps(payload))
          PY
          )

          if [ -z "$metadata_json" ]; then
            echo "Release APK not found." >&2
            exit 1
          fi

          commit_subject=$(git log -1 --pretty=%s)
          commit_author=$(git log -1 --pretty=%an)
          commit_body=$(git log -1 --pretty=%b)
          git_hash=$(git rev-parse --short HEAD)
          caption=$(METADATA_JSON="${metadata_json}" COMMIT_SUBJECT="${commit_subject}" COMMIT_BODY="${commit_body}" COMMIT_AUTHOR="${commit_author}" DURATION_HUMAN="${DURATION_HUMAN}" GIT_BRANCH="${GIT_BRANCH}" GIT_HASH="${git_hash}" SIGNER_NAME="${SIGNER_NAME}" python3 - <<'PY'
          import json
          import os

          metadata = json.loads(os.environ["METADATA_JSON"])
          commit_subject = os.environ["COMMIT_SUBJECT"]
          commit_body = os.environ["COMMIT_BODY"]
          commit_author = os.environ["COMMIT_AUTHOR"]
          duration_human = os.environ["DURATION_HUMAN"]
          git_branch = os.environ["GIT_BRANCH"]
          git_hash = os.environ["GIT_HASH"]
          signer_name = os.environ["SIGNER_NAME"] or "Unknown signer"

          def first_paragraph(text: str) -> str:
              paragraphs = []
              current = []
              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if not line:
                      if current:
                          paragraphs.append(" ".join(current))
                          current = []
                      continue
                  current.append(line)
              if current:
                  paragraphs.append(" ".join(current))
              return paragraphs[0] if paragraphs else ""

          summary = first_paragraph(commit_body)

          def render(subject: str, summary_text: str) -> str:
              lines = [
                  f"Version: {metadata['version_name']} ({metadata['version_code']})",
                  f"APK: {metadata['apk_name']}",
                  f"Commit: {subject}",
                  "",
              ]
              if summary_text:
                  lines.append(summary_text)
                  lines.append("")
              lines.extend(
                  [
                      f"Author: {commit_author}",
                      f"Branch: {git_branch}@{git_hash}",
                      f"Build time: {duration_human}",
                      "",
                      f"Signature: verified : by {signer_name}",
                  ]
              )
              return "\n".join(lines)

          def truncate(text: str, limit: int) -> str:
              if limit <= 0:
                  return ""
              if len(text) <= limit:
                  return text
              if limit <= 3:
                  return text[:limit]
              return text[: limit - 3].rstrip() + "..."

          max_caption_length = 1024

          caption = render(commit_subject, summary)
          if len(caption) > max_caption_length and summary:
              without_summary = render(commit_subject, "")
              summary_budget = max_caption_length - len(without_summary) - 2
              summary = truncate(summary, summary_budget)
              caption = render(commit_subject, summary)

          if len(caption) > max_caption_length:
              base_without_subject = render("", summary)
              subject_budget = max_caption_length - len(base_without_subject)
              if subject_budget < 1:
                  raise SystemExit("Telegram caption template exceeds the 1024 character limit.")
              commit_subject = truncate(commit_subject, subject_budget)
              caption = render(commit_subject, summary)

          print(caption, end="")
          PY
          )

          apk_path=$(METADATA_JSON="${metadata_json}" python3 - <<'PY'
          import json
          import os

          metadata = json.loads(os.environ["METADATA_JSON"])
          print(metadata["apk_path"], end="")
          PY
          )

          apk_name=$(METADATA_JSON="${metadata_json}" python3 - <<'PY'
          import json
          import os

          metadata = json.loads(os.environ["METADATA_JSON"])
          print(metadata["apk_name"], end="")
          PY
          )

          {
            echo "apk_path=$apk_path"
            echo "apk_name=$apk_name"
            delimiter="CAPTION_$(date +%s)_$$"
            echo "caption<<${delimiter}"
            printf '%s\n' "$caption"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        shell: bash
        env:
          APK_PATH: ${{ steps.metadata.outputs.apk_path }}
          EXPECTED_SIGNER_SHA256: ${{ steps.signing_fingerprint.outputs.sha256 }}
        run: |
          set -euo pipefail

          apksigner_output=$("${ANDROID_SDK_ROOT}/build-tools/36.0.0/apksigner" verify --print-certs "${APK_PATH}")
          printf '%s\n' "${apksigner_output}"

          actual_sha256=$(printf '%s\n' "${apksigner_output}" \
            | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' \
            | head -n 1 \
            | tr -d '[:space:]:' \
            | tr '[:upper:]' '[:lower:]')

          if [ -z "${actual_sha256}" ]; then
            echo "Failed to extract the APK signer SHA-256 digest." >&2
            exit 1
          fi

          if [ "${actual_sha256}" != "${EXPECTED_SIGNER_SHA256}" ]; then
            echo "APK was not signed with the expected certificate." >&2
            echo "Expected: ${EXPECTED_SIGNER_SHA256}" >&2
            echo "Actual:   ${actual_sha256}" >&2
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.apk_name }}
          path: ${{ steps.metadata.outputs.apk_path }}
          if-no-files-found: error

      - name: Push APK to Telegram channel
        shell: bash
        env:
          APK_PATH: ${{ steps.metadata.outputs.apk_path }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CAPTION: ${{ steps.metadata.outputs.caption }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Missing Telegram secrets. Configure TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in the Telegram environment." >&2
            exit 1
          fi

          response_file=$(mktemp)
          http_code=$(curl --silent --show-error --output "${response_file}" --write-out "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${APK_PATH}" \
            --form-string "caption=${TELEGRAM_CAPTION}")

          if [ "${http_code}" != "200" ]; then
            echo "Telegram API returned HTTP ${http_code}." >&2
            cat "${response_file}" >&2
            exit 1
          fi

          RESPONSE_FILE="${response_file}" python3 - <<'PY'
          import json
          import os
          import sys

          response_path = os.environ["RESPONSE_FILE"]
          with open(response_path, "r", encoding="utf-8") as fh:
              payload = json.load(fh)

          if not payload.get("ok"):
              description = payload.get("description", "Telegram API returned ok=false")
              raise SystemExit(description)

          result = payload.get("result") or {}
          message_id = result.get("message_id")
          if message_id is None:
              raise SystemExit("Telegram API succeeded but did not return a message_id.")

          print(f"Telegram message_id: {message_id}")
          PY
